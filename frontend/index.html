<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diário de Treinos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Diário de Treinos</h1><p>Registre e acompanhe seus exercícios</p></header>
<main class="container py-4">
<section id="auth" class="row justify-content-center">
<div class="col-md-5 card p-3">
<h2>Entrar</h2>
<form id="login">
<input id="loginEmail" class="form-control mb-2" type="email" placeholder="E-mail" required>
<input id="loginSenha" class="form-control mb-2" type="password" placeholder="Senha" required>
<button class="btn btn-primary">Entrar</button>
</form><hr>
<h2>Cadastro</h2>
<form id="cadastro">
<input id="nomeUsuario" class="form-control mb-2" placeholder="Nome" required>
<input id="emailUsuario" class="form-control mb-2" type="email" placeholder="E-mail" required>
<input id="senhaUsuario" class="form-control mb-2" type="password" placeholder="Senha" required>
<button class="btn btn-success">Cadastrar</button>
</form>
</div>
</section>

<section id="app" class="row d-none">
<div class="col-md-5">
<h2 id="titulo">Novo exercício</h2>
<form id="form" class="card p-3">
<input id="id" type="hidden">
<input id="nome" class="form-control mb-2" placeholder="Exercício" required>
<select id="categoria" class="form-select mb-2">
<option>Peito</option><option>Costas</option><option>Perna</option>
<option>Ombro</option><option>Bíceps</option><option>Tríceps</option>
</select>
<button class="btn btn-primary">Salvar</button>
<button id="cancelar" type="button" class="btn btn-secondary mt-2 d-none">Cancelar</button>
</form>
<button id="sair" class="btn btn-outline-danger mt-3">Sair</button>
</div>
<div class="col-md-7"><h2>Lista de exercícios</h2><div id="lista"></div></div>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
